<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  await loadSession();
  if (isLoggedIn()) { window.location.href = 'dashboard.html'; return; }
  renderNav('login');
})();
</script>
