<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — Is a Problem</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topnav" id="topnav"></header>

<div class="page-narrow">
  <a href="index.html" class="back">Home</a>
  <div class="label" style="margin-bottom:0.5rem;">Trial Application</div>
  <h1 style="margin-bottom:0.5rem;">Apply</h1>
  <p style="color:var(--dim);margin-bottom:2.5rem;">Officers review within 48 hours. You'll be notified here if you login with Discord — or we'll reach out directly.</p>

  <form id="apply-form" class="card" style="padding:2rem;">
    <div id="fields-container"><div class="empty">Loading form…</div></div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem;">
      <a href="index.html" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary" id="submit-btn" disabled>Submit Application →</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
let formFields = [];

// Fields that share a row (col-2 layout)
const ROW_PAIRS = [
  ['char_name', 'discord_tag'],
  ['char_class', 'char_spec'],
];

(async () => {
  await loadSession();
  renderNav('apply');
  await loadForm();
})();

async function loadForm() {
  const { data, error } = await sb.from('form_fields')
    .select('*')
    .eq('enabled', true)
    .order('display_order');

  if (error || !data?.length) {
    document.getElementById('fields-container').innerHTML = '<div class="empty">Could not load form. Try refreshing.</div>';
    return;
  }

  formFields = data;
  renderForm(data);
  document.getElementById('submit-btn').disabled = false;
}

function renderForm(fields) {
  const container = document.getElementById('fields-container');
  const rendered = new Set();
  let html = '';

  for (const field of fields) {
    if (rendered.has(field.field_key)) continue;

    // Check if this field is part of a pair
    const pair = ROW_PAIRS.find(p => p[0] === field.field_key);
    if (pair) {
      const f2 = fields.find(f => f.field_key === pair[1]);
      if (f2) {
        html += `<div class="col-2" style="margin-bottom:1.2rem;">
          ${fieldHtml(field)}
          ${fieldHtml(f2)}
        </div>`;
        rendered.add(field.field_key);
        rendered.add(f2.field_key);
        continue;
      }
    }

    html += `<div class="form-group">${fieldHtml(field)}</div>`;
    rendered.add(field.field_key);
  }

  container.innerHTML = html;
}

function fieldHtml(f) {
  const req = f.required ? ' *' : '';
  const reqAttr = f.required ? 'required' : '';
  const placeholder = f.placeholder || '';
  const label = `<label class="form-label" for="field-${f.field_key}">${esc(f.label)}${req}</label>`;

  if (f.field_type === 'textarea') {
    return `${label}<textarea id="field-${f.field_key}" name="${f.field_key}" rows="4" ${reqAttr} placeholder="${esc(placeholder)}"></textarea>`;
  }
  return `${label}<input type="${f.field_type}" id="field-${f.field_key}" name="${f.field_key}" ${reqAttr} placeholder="${esc(placeholder)}"${f.field_key === 'age' ? ' min="13" max="80"' : ''}>`;
}

document.getElementById('apply-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  // Build payload from dynamic fields
  const payload = { user_id: currentUser?.id || null };
  for (const field of formFields) {
    const el = document.getElementById('field-' + field.field_key);
    if (!el) continue;
    const val = el.value.trim();
    // Map field keys to DB column names
    const colMap = {
      char_name:    'applicant_name',
      discord_tag:  'discord_tag',
      char_class:   'character_class',
      char_spec:    'character_spec',
      age:          'age',
      logs_url:     'logs_url',
      experience:   'experience',
      why_join:     'why_join',
      anything_else:'anything_else',
    };
    const col = colMap[field.field_key] || field.field_key;
    payload[col] = val || null;
  }

  // Also store the custom field data as JSON for any non-standard fields
  const standardKeys = ['applicant_name','discord_tag','character_class','character_spec','age','logs_url','experience','why_join','anything_else','user_id'];
  const extra = {};
  for (const [k, v] of Object.entries(payload)) {
    if (!standardKeys.includes(k) && v) extra[k] = v;
  }
  if (Object.keys(extra).length) payload.extra_fields = JSON.stringify(extra);

  const { error } = await sb.from('applications').insert(payload);
  if (error) {
    toast(error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Submit Application →';
    return;
  }

  document.getElementById('apply-form').innerHTML = `
    <div style="text-align:center;padding:2rem 0;">
      <div style="font-size:2.5rem;margin-bottom:1rem;color:var(--accent);">✓</div>
      <h2 style="margin-bottom:0.8rem;">Application Submitted</h2>
      <p style="color:var(--dim);margin-bottom:2rem;">Officers will review your application within 48 hours. Log in with Discord to track your status.</p>
      <a href="index.html" class="btn btn-outline">Back to Home</a>
    </div>`;
});
</script>
</body>
</html>
