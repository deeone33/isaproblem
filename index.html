<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is a Problem — Horde · Spineshatter EU</title>
<meta name="description" content="Top-10 TBC Anniversary speed kill guild on Spineshatter EU. Recruiting exceptional players.">
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<style>
  /* Officer grid — fixed equal columns, no stretching */
  .officers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 200px);
    gap: 0.6rem;
  }
  .officer-card {
    width: 200px;
    min-height: 110px;
    padding: 1.5rem 1rem;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    box-sizing: border-box;
  }

  /* Hero redesign with logo */
  .hero-new {
    position: relative;
    padding: 5rem 0 4rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    align-items: end;
    overflow: hidden;
    min-height: 420px;
  }
  .hero-logo-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }
  .hero-logo {
    width: 340px;
    height: 340px;
    object-fit: contain;
    opacity: 0.07;
    filter: grayscale(100%) contrast(1.5);
  }
  .hero-left {
    position: relative;
    z-index: 1;
  }
  .hero-new .rank-block {
    position: relative;
    z-index: 1;
  }
  @media (max-width: 860px) {
    .hero-new { grid-template-columns: 1fr; min-height: auto; }
    .hero-logo { width: 220px; height: 220px; }
  }
</style>
</head>
<body>
<header class="topnav" id="topnav"></header>

<div class="page">

  <!-- HERO -->
  <section class="hero-new">
    <!-- Logo centered, large, faded as background anchor -->
    <div class="hero-logo-wrap">
      <img src="logo.png" alt="" class="hero-logo" onerror="this.style.display='none'">
    </div>

    <!-- Left: text -->
    <div class="hero-left">
      <div class="hero-eyebrow">Spineshatter EU · Horde · TBC Anniversary</div>
      <h1>IS A<br>PROBLEM</h1>
      <p class="hero-sub" id="hero-tagline">Loading…</p>
      <div style="display:flex;gap:1rem;flex-wrap:wrap;">
        <a href="apply.html" class="btn btn-primary">Apply to Trial</a>
        <a href="login.html" class="btn btn-outline" id="login-btn">Member Login</a>
      </div>
    </div>

    <!-- Right: rank -->
    <div class="rank-block">
      <div class="rank-num" id="hero-rank">…</div>
      <div class="rank-label" id="rank-label">World Rank · Speed Kills</div>
      <div id="rank-edit-btn" style="display:none;margin-top:0.8rem;">
        <button onclick="editSettings()" class="btn btn-outline btn-sm">Edit</button>
      </div>
    </div>
  </section>

  <!-- OFFICER EDIT MODAL -->
  <div id="settings-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;">
    <div class="card" style="width:100%;max-width:580px;padding:2rem;margin:1rem;">
      <h3 style="margin-bottom:1.5rem;">Edit Hero Section</h3>
      <div class="form-group">
        <label class="form-label">World Rank</label>
        <input type="text" id="set-rank" placeholder="#10">
      </div>
      <div class="form-group">
        <label class="form-label">Rank Label</label>
        <input type="text" id="set-rank-label" placeholder="World Rank · Speed Kills">
      </div>
      <div class="form-group">
        <label class="form-label">Tagline</label>
        <textarea id="set-tagline" rows="3"></textarea>
      </div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem;">
        <button onclick="saveSettings()" class="btn btn-primary">Save</button>
        <button onclick="closeSettings()" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <!-- PROGRESSION -->
  <section class="section">
    <div class="section-head">
      <div>
        <div class="label">Progression</div>
        <h2>The Hunt</h2>
      </div>
    </div>
    <div id="prog-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;">
      <div class="empty">Loading…</div>
    </div>
  </section>

  <!-- NEWS -->
  <section class="section">
    <div class="section-head">
      <div>
        <div class="label">Dispatches</div>
        <h2>News</h2>
      </div>
    </div>
    <div id="news-list"><div class="empty">Loading…</div></div>
  </section>

  <!-- RECRUITMENT -->
  <section class="section">
    <div class="section-head">
      <div>
        <div class="label">Recruitment</div>
        <h2>Open Spots</h2>
      </div>
      <a href="apply.html" class="btn btn-primary">Apply →</a>
    </div>
    <div class="card card-flush" id="recruit-list"><div class="empty">Loading…</div></div>
  </section>

  <!-- OFFICERS -->
  <section class="section">
    <div class="section-head">
      <div>
        <div class="label">Leadership</div>
        <h2>The Council</h2>
      </div>
    </div>
    <div class="officers-grid" id="officers-list">
      <div class="empty">Loading…</div>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
(async () => {
  await loadSession();
  renderNav('home');

  // Hide login btn if already logged in
  if (isLoggedIn()) {
    document.getElementById('login-btn').textContent = 'Dashboard';
    document.getElementById('login-btn').href = 'dashboard.html';
  }

  // Load site settings (rank, tagline)
  const { data: settings } = await sb.from('site_settings').select('*');
  const s = {};
  (settings || []).forEach(r => s[r.key] = r.value);

  document.getElementById('hero-rank').textContent    = s.world_rank   || '#10';
  document.getElementById('hero-tagline').textContent = s.hero_tagline || "Speed-first raiding guild. Top-10 world speed kills. We don't farm — we improve.";
  document.getElementById('rank-label').textContent   = s.rank_label   || 'World Rank · Speed Kills';

  if (isOfficer()) {
    document.getElementById('rank-edit-btn').style.display = 'block';
  }

  // Progression
  const { data: tiers } = await sb.from('progression')
    .select('id,tier,raid_name,display_order,bosses(id,name,kill_time,display_order)')
    .order('display_order');

  const pg = document.getElementById('prog-grid');
  if (!tiers || !tiers.length) {
    pg.innerHTML = '<div class="empty">No progression data yet.</div>';
  } else {
    pg.innerHTML = tiers.map(t => {
      const bosses = (t.bosses||[]).sort((a,b)=>a.display_order-b.display_order);
      const cleared = bosses.filter(b=>b.kill_time).length;
      const pct = bosses.length ? Math.round((cleared/bosses.length)*100) : 0;
      return `<div class="card">
        <div class="label" style="margin-bottom:0.3rem;">${esc(t.tier)}</div>
        <h3 style="margin-bottom:1rem;">${esc(t.raid_name)}</h3>
        <div>${bosses.map(b=>`
          <div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid var(--border);font-size:0.88rem;">
            <span style="color:var(--bone);">${esc(b.name)}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:${b.kill_time?'var(--accent)':'var(--dim)'};">${esc(b.kill_time||'—')}</span>
          </div>`).join('')}
        </div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div style="margin-top:0.4rem;"><span class="label">${cleared}/${bosses.length} bosses</span></div>
      </div>`;
    }).join('');
  }

  // News
  const { data: news } = await sb.from('news').select('*').order('created_at',{ascending:false}).limit(6);
  const nl = document.getElementById('news-list');
  if (!news||!news.length) {
    nl.innerHTML = '<div class="empty">No news yet.</div>';
  } else {
    nl.innerHTML = news.map(n=>`
      <div class="card card-accent">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.4rem;flex-wrap:wrap;gap:0.5rem;">
          <h3>${esc(n.title)}</h3>
          <span class="label">${esc(n.author_name)} · ${fmtDate(n.created_at)}</span>
        </div>
        <p style="white-space:pre-line;">${esc(n.body)}</p>
      </div>`).join('');
  }

  // Recruitment
  const { data: rec } = await sb.from('recruitment').select('*').order('priority').order('created_at');
  const rl = document.getElementById('recruit-list');
  if (!rec||!rec.length) {
    rl.innerHTML = '<div class="empty">No open spots listed. Exceptional players always considered — <a href="apply.html">apply anyway</a>.</div>';
  } else {
    rl.innerHTML = rec.map(r=>`
      <div class="row" style="justify-content:space-between;">
        <div>
          <div style="color:var(--bone);font-weight:500;">${esc(r.class_name)}</div>
          <div style="color:var(--dim);font-size:0.85rem;">${esc(r.spec_notes||'')}</div>
        </div>
        <span class="badge badge-${r.priority}">${r.priority}</span>
      </div>`).join('');
  }

  // Officers
  const { data: offs } = await sb.from('officers').select('*').order('display_order');
  const ol = document.getElementById('officers-list');
  if (!offs||!offs.length) {
    ol.innerHTML = '<div class="empty">Leadership info coming soon.</div>';
  } else {
    ol.innerHTML = offs.map(o=>`
      <div class="officer-card">
        <div style="font-size:0.9rem;font-weight:500;color:var(--white);margin-bottom:0.3rem;">${esc(o.name)}</div>
        <div class="label label-accent">${esc(o.title)}</div>
        ${o.class_spec?`<div style="color:var(--dim);font-size:0.8rem;margin-top:0.4rem;">${esc(o.class_spec)}</div>`:''}
      </div>`).join('');
  }
})();

// Settings modal
async function editSettings() {
  const { data } = await sb.from('site_settings').select('*');
  const s = {};
  (data||[]).forEach(r => s[r.key]=r.value);
  document.getElementById('set-rank').value       = s.world_rank||'#10';
  document.getElementById('set-rank-label').value = s.rank_label||'World Rank · Speed Kills';
  document.getElementById('set-tagline').value    = s.hero_tagline||'';
  document.getElementById('settings-modal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

async function saveSettings() {
  const rank      = document.getElementById('set-rank').value.trim();
  const rankLabel = document.getElementById('set-rank-label').value.trim();
  const tagline   = document.getElementById('set-tagline').value.trim();

  const updates = [
    { key:'world_rank',   value: rank      || '#10' },
    { key:'rank_label',   value: rankLabel || 'World Rank · Speed Kills' },
    { key:'hero_tagline', value: tagline   || '' },
  ];

  for (const u of updates) {
    await sb.from('site_settings').upsert(u, { onConflict:'key' });
  }

  document.getElementById('hero-rank').textContent    = rank;
  document.getElementById('rank-label').textContent   = rankLabel;
  document.getElementById('hero-tagline').textContent = tagline;
  closeSettings();
  toast('Saved.', 'success');
}

// Close modal on background click
document.getElementById('settings-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
</script>
</body>
</html>
